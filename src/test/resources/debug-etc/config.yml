
virusScanService:
  url: http://localhost:20325/
  httpClient:
    timeout: 30s
    connectionTimeout: 15s
    timeToLive: 1h
    retries: 2
#
# See https://www.dropwizard.io/en/latest/manual/configuration.html#logging
#
logging:
  level: INFO
  loggers:
    'nl.knaw.dans': DEBUG
  appenders:
    - type: file
      archive: false
      logFormat: "%-5p [%d{ISO8601}] [%t] %c: %m%n%rEx"
      currentLogFilename: data/dd-virus-scan-cli.log
